<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quest -> Spectacles Controller Bridge</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#111; color:#eee; margin:0; padding:24px; }
    button { font-size:20px; padding:14px 22px; border-radius:10px; border:0; background:#3b82f6; color:#fff; }
    #log { margin-top:16px; font-family: ui-monospace, monospace; font-size:13px; white-space:pre-wrap; color:#9ca3af; }
    .row { margin:8px 0; }
    input { font-size:16px; padding:8px; width:min(520px, 90vw); border-radius:8px; border:1px solid #444; background:#1b1b1b; color:#eee; }
  </style>
</head>
<body>
  <h2>Quest 3 → Spectacles bridge</h2>
  <div class="row">
    <label>Relay URL (wss, producer endpoint):</label><br/>
    <input id="relay" />
  </div>
  <div class="row"><button id="enter">Enter VR & stream both controllers</button></div>
  <div id="log">Open this page in the Quest Browser, then press "Enter VR".
Once in VR, this same log is drawn as a panel in front of you.</div>

  <script>
    const logEl = document.getElementById("log");
    const log = (m) => { logEl.textContent = m + "\n" + logEl.textContent.slice(0, 2000); };

    // Page is served by the relay, so default the producer endpoint to this same origin.
    const relayInput = document.getElementById("relay");
    relayInput.value = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/quest";

    let ws, xrSession, refSpace, gl, glCanvas;
    let reconnectUrl = null;

    // ---- In-VR HUD: draws the log as a screen-locked panel so you can read status while in VR
    // instead of just a blank teal screen. Plain WebGL (no libraries) so it works in both a
    // WebGL1 and WebGL2 context - GLSL ES 1.00 shaders run fine on either.
    let hud = null;

    function setupHud() {
      const vs = `attribute vec2 aPos; attribute vec2 aUv; varying vec2 vUv;
        void main() { vUv = aUv; gl_Position = vec4(aPos, 0.0, 1.0); }`;
      const fs = `precision mediump float; varying vec2 vUv; uniform sampler2D uTex;
        void main() { gl_FragColor = texture2D(uTex, vUv); }`;

      function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
        return s;
      }
      const program = gl.createProgram();
      gl.attachShader(program, compile(gl.VERTEX_SHADER, vs));
      gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(program);

      // A panel anchored toward the bottom-left of each eye's view (NDC space, -1..1).
      const x = -0.95, y = -0.9, w = 1.1, h = 0.6;
      const verts = new Float32Array([
        x,     y,     0, 1,   x + w, y,     1, 1,   x,     y + h, 0, 0,
        x,     y + h, 0, 0,   x + w, y,     1, 1,   x + w, y + h, 1, 0
      ]);
      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

      const canvas2d = document.createElement("canvas");
      canvas2d.width = 900; canvas2d.height = 500;
      const ctx2d = canvas2d.getContext("2d");

      const texture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      hud = {program, buffer, texture, canvas2d, ctx2d, lastText: null};
    }

    function updateHudTexture(text) {
      if (text === hud.lastText) return; // skip the GPU upload when nothing changed
      hud.lastText = text;
      const ctx = hud.ctx2d;
      ctx.fillStyle = "#101820e0";
      ctx.fillRect(0, 0, hud.canvas2d.width, hud.canvas2d.height);
      ctx.fillStyle = "#7CFFB2";
      ctx.font = "26px ui-monospace, monospace";
      ctx.textBaseline = "top";
      text.split("\n").slice(0, 15).forEach((line, i) => ctx.fillText(line, 16, 16 + i * 32));
      gl.bindTexture(gl.TEXTURE_2D, hud.texture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, hud.canvas2d);
    }

    function drawHud(views, glLayer) {
      updateHudTexture(logEl.textContent);

      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
      gl.useProgram(hud.program);
      gl.bindBuffer(gl.ARRAY_BUFFER, hud.buffer);
      const aPos = gl.getAttribLocation(hud.program, "aPos");
      const aUv = gl.getAttribLocation(hud.program, "aUv");
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 16, 0);
      gl.enableVertexAttribArray(aUv);
      gl.vertexAttribPointer(aUv, 2, gl.FLOAT, false, 16, 8);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, hud.texture);
      gl.uniform1i(gl.getUniformLocation(hud.program, "uTex"), 0);

      for (const view of views) {
        const vp = glLayer.getViewport(view);
        gl.viewport(vp.x, vp.y, vp.width, vp.height);
        gl.drawArrays(gl.TRIANGLES, 0, 6);
      }
      gl.disable(gl.BLEND);
    }

    // No auto-reconnect here previously: if this socket dropped even once mid-session (a brief
    // network blip, the host recycling the connection, anything), streaming stopped for good
    // until you manually restarted VR. That's a much worse failure than a brief stutter.
    function openSocket(url) {
      reconnectUrl = url;
      ws = new WebSocket(url);
      ws.onopen = () => log("WS connected: " + url);
      ws.onclose = () => {
        log("WS closed - reconnecting in 1s");
        setTimeout(() => {
          if (reconnectUrl) openSocket(reconnectUrl);
        }, 1000);
      };
      ws.onerror = () => log("WS error (is the relay running and reachable over wss?)");
    }

    document.getElementById("enter").onclick = async () => {
      openSocket(relayInput.value.trim());

      if (!navigator.xr) { log("WebXR not available in this browser."); return; }
      const ok = await navigator.xr.isSessionSupported("immersive-vr");
      if (!ok) { log("immersive-vr not supported."); return; }

      // 1) WebGL context that is XR-compatible (REQUIRED for a valid session render loop).
      glCanvas = document.createElement("canvas");
      gl = glCanvas.getContext("webgl2", { xrCompatible: true })
        || glCanvas.getContext("webgl", { xrCompatible: true });
      if (!gl) { log("Could not create a WebGL context."); return; }
      setupHud();

      try {
        xrSession = await navigator.xr.requestSession("immersive-vr", {
          optionalFeatures: ["local-floor"]
        });
      } catch (e) { log("requestSession failed: " + e); return; }

      // 2) Give the session a base layer, or it stays blank and never delivers frames.
      await gl.makeXRCompatible();
      xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });

      // 3) Reference space (fall back to "local" if local-floor is unavailable).
      try {
        refSpace = await xrSession.requestReferenceSpace("local-floor");
      } catch {
        refSpace = await xrSession.requestReferenceSpace("local");
        log("Using 'local' reference space (no floor).");
      }

      log("VR session started. Streaming left + right controllers.");
      xrSession.requestAnimationFrame(onFrame);
      xrSession.onend = () => log("VR session ended.");
    };

    function onFrame(t, frame) {
      const session = frame.session;
      session.requestAnimationFrame(onFrame); // keep the loop alive first

      // Clear the base framebuffer (dark background behind the HUD panel).
      const glLayer = session.renderState.baseLayer;
      gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
      gl.clearColor(0.05, 0.05, 0.07, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      const viewerPose = frame.getViewerPose(refSpace);
      if (viewerPose && hud) drawHud(viewerPose.views, glLayer);

      let lt = 0, rt = 0, sent = 0;
      for (const src of session.inputSources) {
        if (!src.gripSpace || (src.handedness !== "left" && src.handedness !== "right")) continue;
        const pose = frame.getPose(src.gripSpace, refSpace);
        if (!pose) continue;

        const p = pose.transform.position;
        const q = pose.transform.orientation; // raw controller orientation in Quest world (local-floor)
        const gp = src.gamepad;
        // Quest mapping: buttons[0]=trigger, [1]=squeeze/grip, [3]=stick, [4]=A/X, [5]=B/Y
        const buttons = gp ? gp.buttons.map(b => b.value) : [];
        const axes = gp ? Array.from(gp.axes) : []; // Quest: [touchpadX, touchpadY, stickX, stickY]
        const trigger = gp?.buttons[0]?.value ?? 0;
        const grip = gp?.buttons[1]?.value ?? 0;
        if (src.handedness === "left") lt = trigger; else rt = trigger;

        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({
            hand: src.handedness,
            px: p.x, py: p.y, pz: p.z,
            qx: q.x, qy: q.y, qz: q.z, qw: q.w,
            trigger, grip, buttons, axes
          }));
          sent++;
        }
      }
      if (Math.floor(t / 1000) !== onFrame._sec) {
        onFrame._sec = Math.floor(t / 1000);
        const buffered = ws ? ws.bufferedAmount : 0; // >0 growing = this socket is falling behind
        log(`sent:${sent}  L-trig ${lt.toFixed(2)}  R-trig ${rt.toFixed(2)}  buffered:${buffered}B`);
      }
    }
    onFrame._sec = -1;
  </script>
</body>
</html>
